<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Risk - Risk Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- nav bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-shield-check me-2 text-info"></i>RiskSys
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="assets.html">Assets</a></li>
                    <li class="nav-item"><a class="nav-link active" href="risks.html">Risks</a></li>
                    <li class="nav-item"><a class="nav-link" href="add_mitigation.html">Mitigations</a></li>
                    <li class="nav-item"><a class="nav-link" href="reports.html">Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="audit_logs.html">Audit Logs</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="text-light me-3"><i class="bi bi-person-circle me-1"></i> Admin User</span>
                    <a href="login.html" class="btn btn-outline-light btn-sm">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- main content area -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-danger border-top border-4">
                    <div class="card-header bg-white py-3">
                        <h4 class="mb-0 text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Add Risk</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="addRiskForm">
                            <div class="mb-4">
                                <label class="form-label fw-bold">Selected Asset</label>
                                <select class="form-select bg-light" disabled>
                                    <option value="">PLC Controller 01 (Asset ID: 300)</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="riskDescription" class="form-label fw-bold">Risk Description <span
                                        class="text-danger">*</span></label>
                                <textarea class="form-control" id="riskDescription" rows="3"
                                    placeholder="Describe the potential risk..."></textarea>
                            </div>

                            <div class="row bg-light rounded p-3 mb-4 mx-0 border">
                                <div class="col-md-4 mb-3 mb-md-0">
                                    <label for="likelihood" class="form-label fw-bold">Likelihood (1-5) <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" id="likelihood" onchange="calculateRating()">
                                        <option value="">Select...</option>
                                        <option value="1">1 - Rare</option>
                                        <option value="2">2 - Unlikely</option>
                                        <option value="3">3 - Possible</option>
                                        <option value="4">4 - Likely</option>
                                        <option value="5">5 - Almost Certain</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3 mb-md-0">
                                    <label for="impact" class="form-label fw-bold">Impact (1-5) <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" id="impact" onchange="calculateRating()">
                                        <option value="">Select...</option>
                                        <option value="1">1 - Insignificant</option>
                                        <option value="2">2 - Minor</option>
                                        <option value="3">3 - Moderate</option>
                                        <option value="4">4 - Major</option>
                                        <option value="5">5 - Catastrophic</option>
                                    </select>
                                </div>
                                <div class="col-md-4 d-flex align-items-end">
                                    <div class="w-100">
                                        <label class="form-label fw-bold text-muted">Risk Rating</label>
                                        <div class="fs-4 fw-bold" id="riskRatingDisplay">
                                            <span class="badge bg-secondary">0</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <hr class="my-4 text-muted">
                            <h6 class="mb-3 text-secondary"><i class="bi bi-shield-lock me-2"></i>ISO 27001 Requirements
                            </h6>
                            <div class="row bg-light rounded p-3 mb-4 mx-0 border">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label for="riskTreatment" class="form-label fw-bold">Risk Treatment Option <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" id="riskTreatment">
                                        <option value="">Select Treatment...</option>
                                        <option value="Modify">Modify (Mitigate)</option>
                                        <option value="Retain">Retain (Accept)</option>
                                        <option value="Avoid">Avoid</option>
                                        <option value="Share">Share (Transfer)</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="annexAControls" class="form-label fw-bold">Annex A Mapped
                                        Controls</label>
                                    <!-- this should be dynamic from the db we can expand this on the ISO27001 controls -->
                                    <select class="form-select" id="annexAControls" multiple style="height: 100px;">
                                        <option value="A.5">A.5 Information Security Policies</option>
                                        <option value="A.8">A.8 Asset Management</option>
                                        <option value="A.9">A.9 Access Control</option>
                                        <option value="A.11">A.11 Physical & Environmental Security</option>
                                        <option value="A.12">A.12 Operations Security</option>
                                    </select>
                                    <div class="form-text mt-1 text-muted px-1" style="font-size: 0.75rem;">Hold
                                        Ctrl/Cmd to select multiple options.</div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="reviewDate" class="form-label fw-bold">Review Date</label>
                                    <input type="date" class="form-control" id="reviewDate">
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label for="riskStatus" class="form-label fw-bold">Risk Status</label>
                                    <select class="form-select" id="riskStatus">
                                        <option value="Open">Open</option>
                                        <option value="Mitigated">Mitigated</option>
                                        <option value="Closed">Closed</option>
                                    </select>
                                </div>
                            </div>

                            <!-- validation message -->
                            <div id="validationMessage" class="alert alert-danger d-none" role="alert">
                                Please fill out the Risk Description, Likelihood, and Impact.
                            </div>
                            <!-- success message -->
                            <div id="successMessage" class="alert alert-success d-none" role="alert">
                                Risk saved successfully! Redirecting...
                            </div>

                            <div class="d-flex justify-content-end gap-2 border-top pt-4">
                                <button type="button" class="btn btn-light border"
                                    onclick="window.location.href='risks.html'">Cancel</button>
                                <button type="button" class="btn btn-danger" onclick="handleSave(event)">
                                    <i class="bi bi-shield-exclamation me-1"></i> Save Risk
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function calculateRating() {
            const l = document.getElementById('likelihood').value;
            const i = document.getElementById('impact').value;
            const display = document.getElementById('riskRatingDisplay');

            if (l && i) {
                const rating = parseInt(l) * parseInt(i);
                let badgeClass = 'bg-success';
                if (rating >= 15) {
                    badgeClass = 'bg-danger';
                } else if (rating >= 8) {
                    badgeClass = 'bg-warning text-dark';
                }

                display.innerHTML = `<span class="badge ${badgeClass}">${rating}</span>`;
            } else {
                display.innerHTML = `<span class="badge bg-secondary">0</span>`;
            }
        }

        function handleSave(e) {
            e.preventDefault();
            const desc = document.getElementById('riskDescription').value;
            const l = document.getElementById('likelihood').value;
            const i = document.getElementById('impact').value;
            const treatment = document.getElementById('riskTreatment').value;

            const err = document.getElementById('validationMessage');
            const success = document.getElementById('successMessage');

            if (!desc || !l || !i || !treatment) {
                err.classList.remove('d-none');
                success.classList.add('d-none');
            } else {
                err.classList.add('d-none');
                success.classList.remove('d-none');
                setTimeout(() => {
                    window.location.href = 'risks.html';
                }, 1500);
            }
        }
    </script>
</body>

</html>
